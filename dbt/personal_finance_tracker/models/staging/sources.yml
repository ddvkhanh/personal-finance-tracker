version: 2

sources:
  - name: raw_data
    database: personal_finance_tracker
    schema: public
    tables:
      - name: transactions_raw
        description: "Raw transactions data from the personal finance tracker application."
        columns:
          - name: id
            description: "Unique identifier for each transaction."
          - name: event_type
            description: "Type of event (e.g., income, expense, transfer)."
          - name: response
            description: "Response data associated with the transaction."
          - name: received_at
            description: "Timestamp when the data was ingested."