version: 2

models:
  - name: mart_transactions
    description: "Transaction fact table, one row per transaction, consumption-ready for the dashboard."
    columns:
      - name: transaction_id
        tests:
          - unique
          - not_null
      - name: transaction_date
        tests:
          - not_null
      - name: category_id
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['HELD', 'SETTLED']
      - name: amount
        tests:
          - not_null
